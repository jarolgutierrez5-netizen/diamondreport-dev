name: Update Diamond Report Tracker

on:
  schedule:
    # Runs hourly through the MLB day and late-night final grading window.
    # GitHub Actions uses UTC. This approximates 7 AM through midnight Central during daylight time.
    - cron: '0 12-23 * * *'
    - cron: '0 0-5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-diamond-report-tracker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Grade tracker picks
        run: node scripts/update-tracker.mjs
      - name: Commit updated tracker data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update Diamond Report tracker data'
          file_pattern: 'data/tracker.json data/daily-results.json data/today-predictions.json data/model-data.json'

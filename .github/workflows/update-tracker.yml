name: Update Diamond Report Tracker

on:
  schedule:
    # Runs hourly from ~7:00 AM through midnight Central during daylight time
    # (matches the cadence used by lineup-update.yml and
    # statcast-hot-hitters-update.yml). GitHub Actions uses UTC.
    #
    # Fixed 2026-07: this previously ran ONCE per day at 7:00 AM Central,
    # which is before that day's games are played, so gradeDrpSnapshot()
    # could never find a final game to grade and tracker.json stayed 0-0
    # forever even though the workflow "succeeded" every run. See
    # DIE_ARCHITECTURE.md for the full pipeline trace.
    - cron: '0 12-23 * * *'
    - cron: '0 0-5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Grade tracker picks
        run: node scripts/update-tracker.mjs
      - name: Commit updated tracker data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update Diamond Report tracker data'
          # today-predictions.json was previously left out of this list, so the
          # daily snapshot generated on the runner was never actually persisted
          # back to the repo. model-data.json is also written by the script.
          file_pattern: 'data/tracker.json data/daily-results.json data/today-predictions.json data/model-data.json'

name: Update Statcast Hot Hitters

on:
  schedule:
    # Every 2 hours during the baseball day, UTC times roughly covering morning-night CT.
    - cron: '0 12-23/2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-statcast-hot-hitters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Update Statcast hot hitters
        run: node scripts/updateStatcastHotHitters.js
      - name: Commit updated hot hitter data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/statcast-hot-hitters.json
          git diff --cached --quiet && echo "No Statcast hot hitter changes" || git commit -m "Update Statcast hot hitters"
          git push

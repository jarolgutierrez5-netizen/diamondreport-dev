name: Repo Data Sync

on:
  schedule:
    # Repo data refresh for lineups/model support only. Tracker grading is owned by update-tracker.yml.
    - cron: "0 12-23 * * *"
    - cron: "0 0-5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-data-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-repo-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Update lineups data
        run: node scripts/updateLineups.js
      - name: Commit repo data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/model-data.json data/lineups.json
          git diff --cached --quiet || git commit -m "Sync Diamond Report lineup data"
          git push

name: Repo Data Sync

on:
  schedule:
    # Morning seed/check, hourly daytime refreshes, and late-night grading window.
    # Times are UTC. This approximates 7 AM through midnight Central depending on DST.
    - cron: "0 12-23 * * *"
    - cron: "0 0-5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-data-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-repo-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Update tracker data
        run: node scripts/updateTracker.js
      - name: Update lineups data
        run: node scripts/updateLineups.js
      - name: Commit repo data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tracker.json data/daily-results.json data/model-data.json data/lineups.json
          git diff --cached --quiet || git commit -m "Sync Diamond Report data"
          git push

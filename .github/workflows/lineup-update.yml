name: Hourly Lineup Watch

on:
  schedule:
    # Checks every hour from 7:00 AM through 11:00 PM Central during daylight saving time.
    # GitHub cron is UTC. During standard time, this runs one hour earlier in Central time.
    - cron: "0 12-23 * * *"
    - cron: "0 0-4 * * *"
  workflow_dispatch:
    inputs:
      lineup_date:
        description: "Optional MLB date to update, YYYY-MM-DD"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: lineup-watch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-lineups:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Update MLB lineups
        env:
          LINEUP_DATE: ${{ github.event.inputs.lineup_date }}
        run: node scripts/updateLineups.js
      - name: Commit lineup data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lineups.json
          git diff --cached --quiet || git commit -m "Update MLB lineups"
          git push
